services:
  # ─── PostgreSQL Database ────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: mm_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: midnight_meridian
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d midnight_meridian"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  # ─── Node.js Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mm_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: midnight_meridian
      DB_USER: postgres
      DB_PASSWORD: postgres123
      JWT_SECRET: midnight_meridian_jwt_secret_2026_very_secure
      JWT_EXPIRES_IN: 8h
      NODE_ENV: production
    ports:
      - "5000:5000"

  # ─── React Frontend (Nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mm_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "1644:80"

volumes:
  postgres_data:
    name: mm_postgres_data
